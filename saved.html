<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FloatYourBoat — Saved Listings</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Navbar -->
  <header class="navbar" id="navbar"></header>

  <!-- Notification Area -->
  <div id="notification-area" style="position:sticky; top:64px; z-index:99; padding:0 2rem;"></div>

  <!-- Main Content -->
  <main class="main-content">
    <div class="section-header">
      <h2>🔖 Saved Listings</h2>
      <span id="saved-count" style="color:var(--mid-gray); font-size:0.9rem;"></span>
    </div>

    <!-- Listings -->
    <div id="saved-container"></div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">🔖</div>
      <h3>No saved listings yet</h3>
      <p>Browse available boats and click "+ Save" to bookmark ones you like.</p>
      <a href="browse.html" class="btn btn-primary mt-2">Browse Listings</a>
    </div>
  </main>

  <footer>
    <p>© 2026 FloatYourBoat &mdash; FSU Database Class Project &nbsp;|&nbsp; <a href="browse.html">Browse</a></p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/saved.js"></script>
</body>
</html>
