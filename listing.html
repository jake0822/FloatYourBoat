<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FloatYourBoat — Listing Details</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Navbar -->
  <header class="navbar" id="navbar"></header>

  <!-- Notification Area -->
  <div id="notification-area" style="position:sticky; top:64px; z-index:99; padding:0 2rem;"></div>

  <!-- Main Content -->
  <main class="main-content">
    <div id="listing-container">
      <p style="color:var(--mid-gray);">Loading listing…</p>
    </div>
  </main>

  <!-- Contact Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Contact Seller</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modal-confirm">Send Message</button>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2026 FloatYourBoat &mdash; FSU Database Class Project &nbsp;|&nbsp; <a href="browse.html">Browse</a></p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/listing.js"></script>
</body>
</html>
